version: '3.3'

services:
  # ===== LiteLLM with Local Models =====
  litellm-local:
    build:
      context: .
      dockerfile: Dockerfile.local-models
    container_name: entrag-litellm-local
    env_file: .env
    ports:
      - "4001:4000"
    volumes:
      - ./litellm_config_local.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:4000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
