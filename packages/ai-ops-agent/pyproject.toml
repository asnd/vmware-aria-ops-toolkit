[project]
name = "vmware-ai-ops-agent"
version = "1.1.0"
description = "AI-powered proactive maintenance agent for VMware Aria Operations and vRLI"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Security Research Team"}
]
keywords = ["vmware", "aria-operations", "vrli", "ai", "ops", "monitoring", "llm", "mcp"]

dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "openai>=1.0.0",
    "rich>=13.0.0",
    "typer>=0.9.0",
    "apscheduler>=3.10.0",
    "jinja2>=3.1.0",
    "prometheus-client>=0.19.0",
    "structlog>=23.0.0",
    "tenacity>=8.2.0",
    "asyncio-throttle>=1.0.0",
    "pyyaml>=6.0.0",
    "langgraph>=0.0.10",
    "langchain>=0.1.0",
    "langchain-openai>=0.0.5",
    "langchain-community>=0.0.10",
    "faiss-cpu>=1.7.4",
]

[project.optional-dependencies]
legacy = [
    "duckduckgo-search>=4.0.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.4.0",
    "mypy>=1.0.0",
    "respx>=0.21.0",
]

[project.scripts]
vmware-ai-agent = "vmware_ai_ops_agent.cli:app"

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]
ignore = ["UP042"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
