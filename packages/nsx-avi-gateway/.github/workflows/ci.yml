# GitHub Actions CI/CD Pipeline for NSX-T/AVI API Gateway
# Converted from GitLab CI

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHONUNBUFFERED: "1"

jobs:
  # ==================== Lint Stage ====================
  lint-ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Ruff linter
        run: ruff check app/ tests/

  lint-ruff-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Check code formatting
        run: ruff format app/ tests/ --check

  lint-mypy:
    runs-on: ubuntu-latest
    continue-on-error: true  # Type checking optional for now
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run MyPy
        run: mypy app/ --ignore-missing-imports

  # ==================== Test Stage ====================
  test-unit:
    runs-on: ubuntu-latest
    needs: [lint-ruff, lint-ruff-format]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=app --cov-report=term --cov-report=html --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

  test-integration:
    runs-on: ubuntu-latest
    needs: [lint-ruff, lint-ruff-format]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  # ==================== Security Stage ====================
  security-bandit:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit
      - name: Run Bandit security scanner
        run: |
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -f screen
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  security-safety:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install safety
      - name: Check dependencies for vulnerabilities
        run: safety check || true

  # ==================== Build Stage ====================
  build-docker:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t nsx-avi-gateway:${{ github.sha }} .
          docker tag nsx-avi-gateway:${{ github.sha }} nsx-avi-gateway:latest

  # ==================== Manual Jobs ====================
  validate-config:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate configuration files
        run: |
          python -c "import yaml; yaml.safe_load(open('config/sites.yml.example'))"
          python -c "import yaml; yaml.safe_load(open('config/operations_allowlist.yml.example'))"
          echo "Configuration files are valid YAML"
