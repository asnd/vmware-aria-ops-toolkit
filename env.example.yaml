NSX_MANAGER:        "10.x.x.x"
NSX_USER:           "admin"
NSX_PASSWORD:       "xxx"
VERIFY_SSL:         false

T0_GATEWAY_ID:      "t0-gw"
EDGE_CLUSTER_ID:    "edge-cluster-1"
OVERLAY_TZ_ID:      "overlay-tz"

# BGP
BGP_LOCAL_ASN:      65001
BGP_PEER_IP:        "10.x.x.1"
BGP_PEER_ASN:       65000
BFD_INTERVAL:       500
BFD_MULTIPLIER:     3

# HA VIP
HA_VIP_IP:          "10.x.x.100/24"

# Test VMs (pre-existing)
VM1_IP:             "172.16.1.10"
VM2_IP:             "172.16.2.10"
VM_USER:            "root"
VM_PASSWORD:        "xxx"
EXTERNAL_TEST_IP:   "10.x.x.5"

# bbprobe (data-plane probe binary, deployed to the VMs by tests/00_provision).
# By default no setup is needed here: deploy_bbprobe.robot detects each VM's own
# architecture and downloads + checksum-verifies the pinned BBPROBE_VERSION release
# from https://github.com/asnd/bbprobe/releases, caching it under BBPROBE_CACHE_DIR
# (default ~/.cache/nsxt-robot/bbprobe/). Uncomment BBPROBE_LOCAL_PATH only to use a
# custom or offline/air-gapped build instead (skips the download entirely):
# BBPROBE_LOCAL_PATH:   "/absolute/path/to/bbprobe-linux-amd64"
# BBPROBE_VERSION:      "v0.9.0"
BBPROBE_REMOTE_PATH:  "/usr/local/bin/bbprobe"
PROBE_MAX_LATENCY:    2.0

# SNAT
SNAT_TRANSLATED_IP: "10.x.x.50"

# DNAT (inbound: external floating IP → internal server)
DNAT_DESTINATION_IP: "10.x.x.51"      # external/floating IP that clients hit
DNAT_TRANSLATED_IP:  "172.16.1.10"    # internal server it maps to (VM1)

# DFW (distributed firewall micro-segmentation)
DFW_TEST_TAG:       "app|bbtest"      # scope|value tag used for the dynamic tag group

# ALB
ALB_VIP:            "10.x.x.60"
ALB_POOL_MEMBERS:
  - "172.16.1.10"
ALB_VIP_PORT:       80
ALB_POOL_PORT:      8080

# ALB L7 (HTTP) + health monitor
ALB_L7_VIP:         "10.x.x.61"
ALB_L7_VIP_PORT:    80
ALB_MONITOR_PORT:   8080
ALB_MONITOR_URL:    "/"

# Overlay MTU probe (1472B payload + 28B headers = 1500B inner frame)
OVERLAY_MTU_PAYLOAD: 1472

# Segments
T1A_SEGMENT_CIDR:   "172.16.1.1/24"
T1B_SEGMENT_CIDR:   "172.16.2.1/24"

# T0-VRF / EVPN (tests/10_t0_vrf) — the VRF uplink rides a VLAN segment on VLAN_TZ_ID
VLAN_TZ_ID:           "vlan-tz"
VRF_PARENT_LS_ID:     "default"        # parent T0 locale service to inherit the edge cluster from
VRF_UPLINK_VLAN:      100
VRF_UPLINK_IP:        "192.168.100.2"
VRF_UPLINK_PREFIX:    24
VRF_STATIC_NETWORK:   "10.99.0.0/24"
VRF_STATIC_NEXTHOP:   "192.168.100.1"
VRF_BGP_PEER_IP:      "192.168.100.1"
VRF_BGP_PEER_ASN:     65000
# EVPN-only values (tests tagged `evpn`; exclude with -e evpn on non-EVPN fabrics)
VRF_RD:               "65001:100"      # route distinguisher (ASN:nn or IP:nn)
VRF_RT_IMPORT:        "65001:100"      # import route target (L2VPN_EVPN)
VRF_RT_EXPORT:        "65001:100"      # export route target (L2VPN_EVPN)
VRF_EVPN_TRANSIT_VNI: 75001            # must fall inside the VNI pool below
EVPN_VNI_POOL_START:  75001
EVPN_VNI_POOL_END:    75100

# Failure simulation (tests/11_failover) — segment/BGP/edge-node fault injection.
# EDGE1_MGMT_IP is the edge node's management IP (SSH), used only by the `destructive`
# tests (dataplane restart / reboot). Unlike NSX_PASSWORD/VM_PASSWORD, EDGE_PASSWORD
# defaults to empty ON PURPOSE: the destructive tests Skip when it's unset, so they
# stay off until you deliberately opt in. Set it here or via the EDGE_PASSWORD
# environment variable (which wins when set) to enable them, or exclude them
# wholesale with `-e destructive` (add `-e ha` too on a single-edge lab).
FAILOVER_MAX_RECOVERY:     "120 sec"
EDGE_REBOOT_MAX_RECOVERY:  "600 sec"
EDGE1_MGMT_IP:              "10.x.x.10"
EDGE_USER:                  "admin"
EDGE_PASSWORD:               ""
EDGE_SSH_PORT:               22
