name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv and install deps
        run: |
          uv venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Lint with ruff
        run: .venv/bin/ruff check src/ scripts/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv and install deps
        run: |
          uv venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run tests
        run: .venv/bin/pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: docker build -f Containerfile -t entrag:ci .

      - name: Smoke test container
        run: docker run --rm entrag:ci python -c "import src; print('OK')"
