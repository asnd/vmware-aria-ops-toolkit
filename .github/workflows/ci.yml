name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dev deps
        run: uv sync --extra dev --frozen

      - name: Run ruff
        run: uv run ruff check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dev deps
        run: uv sync --extra dev --frozen

      - name: Install pytest-cov
        run: uv pip install pytest-cov

      - name: Run tests
        run: |
          uv run pytest -ra --tb=short -v --maxfail=1 --durations=10 \
            --cov=src/ariaops_mcp --cov-report=term-missing
        env:
          ARIAOPS_HOST: vrops.test.local
          ARIAOPS_USERNAME: testuser
          ARIAOPS_PASSWORD: testpass

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dev deps
        run: uv sync --extra dev --frozen

      - name: Run pyright
        run: uv run pyright src/
