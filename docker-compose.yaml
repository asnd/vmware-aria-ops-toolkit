version: "3.8"

services:
  vmware-ai-agent:
    build:
      context: .
      dockerfile: Containerfile
    container_name: vmware-ai-agent
    restart: unless-stopped
    ports:
      - "9090:9090"  # Prometheus metrics
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - VMWARE_AI_VRLI__HOST=${VRLI_HOST:-vrli.example.com}
      - VMWARE_AI_VRLI__USERNAME=${VRLI_USERNAME}
      - VMWARE_AI_VRLI__PASSWORD=${VRLI_PASSWORD}
      - VMWARE_AI_VCENTER__HOST=${VCENTER_HOST:-vcenter.example.com}
      - VMWARE_AI_VCENTER__USERNAME=${VCENTER_USERNAME}
      - VMWARE_AI_VCENTER__PASSWORD=${VCENTER_PASSWORD}
      - VMWARE_AI_LLM__ENDPOINT=${LLM_ENDPOINT:-http://lightllm:8000/v1}
      - VMWARE_AI_LLM__API_KEY=${LLM_API_KEY}
      # MCP Client Configuration
      - VMWARE_AI_ARIAOPS_MCP__URL=http://ariaops-mcp:8080/mcp
      - VMWARE_AI_ARIAOPS_MCP__ENABLED=true
      - VMWARE_AI_ARIAOPS_MCP__AUTH_TOKEN=${ARIAOPS_MCP_TOKEN:-}
      - VMWARE_AI_ENTRAG_MCP__URL=http://entrag-mcp:8080/mcp
      - VMWARE_AI_ENTRAG_MCP__ENABLED=true
      - VMWARE_AI_ENTRAG_MCP__AUTH_TOKEN=${ENTRAG_MCP_TOKEN:-}
    networks:
      - vmware-ai-network
    depends_on:
      ariaops-mcp:
        condition: service_healthy
      entrag-mcp:
        condition: service_healthy
      lightllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ariaops-mcp:
    image: ${ARIAOPS_MCP_IMAGE:-ariaops-mcp:latest}
    build:
      context: ${ARIAOPS_MCP_PATH:-../ariaops_mcp}
      dockerfile: Containerfile
    container_name: ariaops-mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ARIAOPS_HOST=${ARIAOPS_HOST:-aria-ops.example.com}
      - ARIAOPS_USERNAME=${ARIAOPS_USERNAME}
      - ARIAOPS_PASSWORD=${ARIAOPS_PASSWORD}
      - ARIAOPS_AUTH_SOURCE=${ARIAOPS_AUTH_SOURCE:-local}
      - ARIAOPS_TRANSPORT=http
      - ARIAOPS_PORT=8080
      - ARIAOPS_VERIFY_SSL=${ARIAOPS_VERIFY_SSL:-true}
      - ARIAOPS_ENABLE_WRITE_OPERATIONS=${ARIAOPS_ENABLE_WRITE:-false}
      - ARIAOPS_LOG_LEVEL=${ARIAOPS_LOG_LEVEL:-INFO}
      - ARIAOPS_LOG_FORMAT=json
    networks:
      - vmware-ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  entrag-mcp:
    image: ${ENTRAG_MCP_IMAGE:-entrag-mcp:latest}
    build:
      context: ${ENTRAG_MCP_PATH:-../entrag}
      dockerfile: Containerfile
    container_name: entrag-mcp
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - entrag_data:/app/data
    environment:
      - MCP_TRANSPORT=http
      - MCP_PORT=8080
      - LITELLM_API_BASE=${LITELLM_API_BASE:-http://lightllm:8000/v1}
      - LITELLM_API_KEY=${LLM_API_KEY:-}
      - LANCEDB_PATH=/app/data/lancedb
    networks:
      - vmware-ai-network
    depends_on:
      lightllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  lightllm:
    image: ghcr.io/modelfamily/lightllm:latest
    container_name: vmware-ai-lightllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${MODEL_PATH:-./models}:/models
    environment:
      - MODEL_PATH=/models/${MODEL_NAME:-mistral-7b-instruct}
      - MAX_TOTAL_TOKEN_NUM=8192
      - BATCH_MAX_TOKENS=4096
    networks:
      - vmware-ai-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  prometheus:
    image: prom/prometheus:latest
    container_name: vmware-ai-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - vmware-ai-network

  grafana:
    image: grafana/grafana:latest
    container_name: vmware-ai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - vmware-ai-network
    depends_on:
      - prometheus

networks:
  vmware-ai-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  entrag_data:
